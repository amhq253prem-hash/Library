<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Booking - Booking Form</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Harris Library Book Booking</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="booking.html">Booking Form</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="book.html">Book</a>
                    </li>
                    <li class="nav-item ms-3">
                        <span id="navUser" style="color:#f0c040;font-size:0.85rem;font-weight:600"></span>
                    </li>
                    <li class="nav-item ms-2">
                        <button id="logoutBtn" class="nav-link" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;color:#fff;font-size:0.85rem;padding:5px 14px">
                            Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE BANNER -->
    <div class="page-banner">
        <div class="container">
            <h2>Booking Form</h2>
            <p>Fill in the details below to reserve your book.</p>
        </div>
    </div>

    <!-- BOOKING FORM -->
    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="booking-card">

                    <form id="bookingForm">

                        <!-- Student Name -->
                        <div class="mb-3">
                            <label class="form-label" for="studentName">Student Name</label>
                            <input type="text" class="form-control" id="studentName" placeholder="Enter your full name">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label" for="studentEmail">Email</label>
                            <input type="email" class="form-control" id="studentEmail" placeholder="Enter your email">
                        </div>

                        <!-- Date -->
                        <div class="mb-3">
                            <label class="form-label" for="bookingDate">Reservation Date</label>
                            <input type="date" class="form-control" id="bookingDate">
                        </div>

                        <!-- Select Book -->
                        <div class="mb-4">
                            <label class="form-label" for="bookSelect">Select Book</label>
                            <select class="form-select" id="bookSelect">
                                <option value="" disabled selected>Select Book</option>
                                <option value="HTML Guide">HTML Guide</option>
                                <option value="JavaScript Guide">JavaScript Guide</option>
                                <option value="Bootstrap Guide">Bootstrap Guide</option>
                                <option value="CSS Guide">CSS Guide</option>
                            </select>
                        </div>

                        <!-- Reserve Button -->
                        <button type="submit" class="btn-reserve">Reserve</button>

                    </form>

                    <!-- Error Message -->
                    <div id="errorMsg"></div>

                    <!-- Success Message -->
                    <div id="successMsg"></div>

                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Harris Library Book Booking System &copy; 2026</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth JS (must load first) -->
    <script src="auth.js"></script>

    <!-- Booking JS -->
    <script src="booking.js"></script>

</body>
</html>
